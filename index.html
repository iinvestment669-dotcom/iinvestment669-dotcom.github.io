<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #6C63FF;
            margin: 20px 0;
            font-size: 24px;
        }

        /* ===== JOIN SECTION ===== */
        .join-section {
            background: #141428;
            padding: 30px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
        }

        .join-section input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            margin: 10px 0;
        }

        .join-section input:focus {
            outline: none;
            border-color: #6C63FF;
        }

        .join-section .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: #6C63FF;
            color: #fff;
        }

        .btn-primary:hover {
            background: #5A52D5;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            border-color: #6C63FF;
            color: #6C63FF;
        }

        .btn-danger {
            background: #ff4444;
            color: #fff;
        }

        .btn-danger:hover {
            background: #cc0000;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        .my-id {
            color: #8892b0;
            font-size: 14px;
            margin-top: 10px;
        }

        .my-id strong {
            color: #fff;
        }

        /* ===== VIDEO ===== */
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            width: 100%;
            max-width: 900px;
        }

        .video-box {
            background: #141428;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            min-height: 250px;
            border: 2px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-box.active {
            border-color: #6C63FF;
        }

        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
        }

        .video-box .label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .video-box .placeholder {
            color: #8892b0;
            text-align: center;
            font-size: 14px;
        }

        .video-box .placeholder i {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
            color: #333;
        }

        /* ===== CONTROLS ===== */
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .controls .btn:hover {
            transform: scale(1.05);
        }

        .controls .btn-off {
            background: #ff4444;
            color: #fff;
        }

        .controls .btn-on {
            background: #6C63FF;
            color: #fff;
        }

        .controls .btn-on:hover {
            background: #5A52D5;
        }

        .controls .btn-off:hover {
            background: #cc0000;
        }

        .hidden {
            display: none !important;
        }

        /* ===== STATUS ===== */
        .status-text {
            color: #8892b0;
            font-size: 14px;
            margin: 10px 0;
            text-align: center;
        }

        .status-text .connected {
            color: #00C853;
        }

        .status-text .waiting {
            color: #FFC107;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
            }

            .video-box {
                min-height: 180px;
            }

            .join-section {
                padding: 20px;
            }

            .controls .btn {
                padding: 8px 14px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <h1>🎥 Video Chat</h1>

    <!-- ===== JOIN SECTION ===== -->
    <div class="join-section" id="joinSection">
        <h3 style="margin-bottom:10px;">Join or Create a Room</h3>
        <input type="text" id="roomInput" placeholder="Enter Room ID..." />
        <div>
            <button class="btn btn-primary" onclick="joinRoom()">📞 Join Room</button>
            <button class="btn btn-secondary" onclick="createRoom()">✨ Create Room</button>
        </div>
        <p class="my-id">Your ID: <strong id="myPeerId">Loading...</strong></p>
    </div>

    <!-- ===== ROOM INFO ===== -->
    <div id="roomInfo" class="hidden" style="text-align:center;margin:10px 0;background:#141428;padding:12px 24px;border-radius:50px;">
        Room: <strong id="roomIdDisplay">---</strong>
        <button class="btn btn-primary btn-sm" onclick="copyRoomId()">📋 Copy</button>
        <button class="btn btn-danger btn-sm" onclick="leaveRoom()">🚪 Leave</button>
    </div>

    <!-- ===== STATUS ===== -->
    <div class="status-text" id="statusText">
        <span class="waiting">⏳ Waiting to connect...</span>
    </div>

    <!-- ===== VIDEO ===== -->
    <div class="video-container">
        <div class="video-box active" id="localBox">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="label">📸 You</div>
        </div>
        <div class="video-box" id="remoteBox">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label" id="remoteLabel" style="display:none;">👤 Guest</div>
            <div class="placeholder" id="remotePlaceholder">
                <i class="fas fa-user"></i>
                <p>Waiting for someone...</p>
            </div>
        </div>
    </div>

    <!-- ===== CONTROLS ===== -->
    <div class="controls" id="controls">
        <button class="btn btn-on" id="micBtn" onclick="toggleMic()">🎤 Mic</button>
        <button class="btn btn-on" id="cameraBtn" onclick="toggleCamera()">📷 Camera</button>
        <button class="btn btn-on" id="screenBtn" onclick="toggleScreen()">🖥️ Screen</button>
        <button class="btn btn-danger" onclick="leaveRoom()">📞 End Call</button>
    </div>

    <!-- ============================================
    JAVASCRIPT
    ============================================ -->
    <script>
        // ============================================
        // PEERJS
        // ============================================
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                ]
            }
        });

        let currentRoom = null;
        let localStream = null;
        let remoteStream = null;
        let call = null;
        let isMuted = false;
        let isCameraOff = false;
        let screenStream = null;
        let isScreenSharing = false;

        // ===== DOM =====
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const remotePlaceholder = document.getElementById('remotePlaceholder');
        const remoteLabel = document.getElementById('remoteLabel');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const roomInfo = document.getElementById('roomInfo');
        const joinSection = document.getElementById('joinSection');
        const roomInput = document.getElementById('roomInput');
        const myPeerIdEl = document.getElementById('myPeerId');
        const statusText = document.getElementById('statusText');

        // ============================================
        // PEER EVENTS
        // ============================================
        peer.on('open', (id) => {
            myPeerIdEl.textContent = id;
            console.log('✅ Connected:', id);
        });

        peer.on('error', (err) => {
            console.error('Error:', err);
            if (err.type === 'unavailable-id') {
                alert('❌ Room ID taken. Try another.');
            }
        });

        // ============================================
        // CREATE ROOM
        // ============================================
        function createRoom() {
            const roomId = generateRoomId();
            roomInput.value = roomId;
            joinRoom(roomId);
        }

        // ============================================
        // JOIN ROOM
        // ============================================
        function joinRoom(roomId) {
            roomId = roomId || roomInput.value.trim();
            if (!roomId) {
                alert('Please enter a Room ID');
                return;
            }

            currentRoom = roomId;
            roomIdDisplay.textContent = roomId;
            roomInfo.classList.remove('hidden');
            joinSection.classList.add('hidden');

            updateStatus('Connecting...', 'waiting');

            // Get camera & mic
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then((stream) => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    updateStatus('Connected! Waiting for others...', 'waiting');

                    // Listen for incoming calls
                    peer.on('call', (incomingCall) => {
                        console.log('📞 Incoming call from:', incomingCall.peer);
                        if (localStream) {
                            incomingCall.answer(localStream);
                            handleCall(incomingCall);
                        }
                    });

                    // Try to call the room
                    setTimeout(() => {
                        const callPeer = peer.call(roomId, localStream);
                        if (callPeer) {
                            handleCall(callPeer);
                        } else {
                            console.log('⏳ Waiting for others...');
                            updateStatus('⏳ Waiting for someone to join...', 'waiting');
                        }
                    }, 1500);

                })
                .catch((err) => {
                    console.error('Media error:', err);
                    alert('❌ Please allow camera and microphone access');
                    // Try audio only
                    navigator.mediaDevices.getUserMedia({ video: false, audio: true })
                        .then((stream) => {
                            localStream = stream;
                            alert('⚠️ Camera not available - Audio only');
                        })
                        .catch(() => {
                            alert('❌ Cannot access camera or microphone');
                        });
                });
        }

        // ============================================
        // HANDLE CALL
        // ============================================
        function handleCall(incomingCall) {
            call = incomingCall;
            call.on('stream', (remoteStreamData) => {
                remoteStream = remoteStreamData;
                remoteVideo.srcObject = remoteStreamData;
                remotePlaceholder.style.display = 'none';
                remoteLabel.style.display = 'flex';
                updateStatus('✅ Connected with guest!', 'connected');
                console.log('✅ Remote stream connected!');
            });

            call.on('close', () => {
                console.log('🔴 Call ended');
                remoteVideo.srcObject = null;
                remotePlaceholder.style.display = 'block';
                remoteLabel.style.display = 'none';
                updateStatus('⏳ Other user left. Waiting...', 'waiting');
                call = null;
            });
        }

        // ============================================
        // CONTROLS
        // ============================================
        function toggleMic() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            const btn = document.getElementById('micBtn');
            btn.textContent = isMuted ? '🎤 Muted' : '🎤 Mic';
            btn.className = isMuted ? 'btn btn-off' : 'btn btn-on';
        }

        function toggleCamera() {
            if (!localStream) return;
            isCameraOff = !isCameraOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isCameraOff);
            const btn = document.getElementById('cameraBtn');
            btn.textContent = isCameraOff ? '📷 Off' : '📷 Camera';
            btn.className = isCameraOff ? 'btn btn-off' : 'btn btn-on';
        }

        function toggleScreen() {
            if (isScreenSharing) {
                if (screenStream) {
                    screenStream.getTracks().forEach(t => t.stop());
                    screenStream = null;
                }
                localVideo.srcObject = localStream;
                isScreenSharing = false;
                const btn = document.getElementById('screenBtn');
                btn.textContent = '🖥️ Screen';
                btn.className = 'btn btn-on';
                return;
            }

            navigator.mediaDevices.getDisplayMedia({ video: true })
                .then((stream) => {
                    screenStream = stream;
                    localVideo.srcObject = stream;
                    isScreenSharing = true;
                    const btn = document.getElementById('screenBtn');
                    btn.textContent = '🛑 Stop';
                    btn.className = 'btn btn-off';

                    stream.getVideoTracks()[0].onended = () => {
                        toggleScreen();
                    };
                })
                .catch(() => {
                    alert('Screen sharing cancelled.');
                });
        }

        // ============================================
        // LEAVE ROOM
        // ============================================
        function leaveRoom() {
            if (confirm('Leave the room?')) {
                if (call) {
                    call.close();
                    call = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(t => t.stop());
                    remoteStream = null;
                }
                if (screenStream) {
                    screenStream.getTracks().forEach(t => t.stop());
                    screenStream = null;
                }

                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                remotePlaceholder.style.display = 'block';
                remoteLabel.style.display = 'none';

                roomInfo.classList.add('hidden');
                joinSection.classList.remove('hidden');
                updateStatus('Disconnected', 'waiting');
                currentRoom = null;

                // Reset buttons
                document.getElementById('micBtn').textContent = '🎤 Mic';
                document.getElementById('micBtn').className = 'btn btn-on';
                document.getElementById('cameraBtn').textContent = '📷 Camera';
                document.getElementById('cameraBtn').className = 'btn btn-on';
                document.getElementById('screenBtn').textContent = '🖥️ Screen';
                document.getElementById('screenBtn').className = 'btn btn-on';
                isMuted = false;
                isCameraOff = false;
                isScreenSharing = false;
            }
        }

        // ============================================
        // UTILITY
        // ============================================
        function generateRoomId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = '';
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        function copyRoomId() {
            const roomId = roomIdDisplay.textContent;
            navigator.clipboard.writeText(roomId).then(() => {
                alert('✅ Room ID copied: ' + roomId);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = roomId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Room ID copied: ' + roomId);
            });
        }

        function updateStatus(text, type) {
            const color = type === 'connected' ? 'connected' : 'waiting';
            statusText.innerHTML = `<span class="${color}">${text}</span>`;
        }

        // ============================================
        // ENTER KEY
        // ============================================
        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });

        console.log('🎥 Video Chat Loaded!');
        console.log('📱 Share Room ID to connect with others!');
    </script>
</body>
</html>
