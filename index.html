    <title>Street Wars · Full Screen</title>

    <style>
        /* ====== FULL SCREEN STYLES ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Segoe UI', 'Arial Black', system-ui, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
            background: #0d0d0d;
            cursor: crosshair;
            touch-action: none;
        }

        /* HUD overlay */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }

        .hud-left, .hud-right {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .hud-item {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            pointer-events: auto;
        }

        .hud-item span {
            color: #ffd966;
        }

        #healthBar {
            width: 180px;
            height: 10px;
            background: rgba(255,0,0,0.25);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        #healthFill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff1744, #ff6d00);
            transition: width 0.15s ease;
            border-radius: 10px;
        }

        #wantedLevel {
            color: #ff3d00;
            font-size: 20px;
            letter-spacing: 2px;
        }

        #controls-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            color: #aaa;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            font-weight: 500;
        }

        #controls-hint kbd {
            background: #222;
            padding: 2px 10px;
            border-radius: 4px;
            color: #fff;
            border: 1px solid #444;
            margin: 0 2px;
        }

        #gameOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            flex-direction: column;
            gap: 20px;
        }

        #gameOverlay.show {
            display: flex;
        }

        #gameOverlay h1 {
            color: #ff1744;
            font-size: 64px;
            text-shadow: 0 0 40px rgba(255, 23, 68, 0.6);
            letter-spacing: 4px;
        }

        #gameOverlay .sub {
            color: #ccc;
            font-size: 22px;
        }

        #gameOverlay .final-score {
            color: #ffd966;
            font-size: 32px;
            font-weight: 700;
        }

        #restartBtn {
            margin-top: 10px;
            padding: 14px 50px;
            font-size: 20px;
            font-weight: 700;
            background: #ff1744;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 1px;
            box-shadow: 0 0 30px rgba(255, 23, 68, 0.3);
            pointer-events: auto;
        }

        #restartBtn:hover {
            transform: scale(1.05);
            background: #ff2a55;
            box-shadow: 0 0 50px rgba(255, 23, 68, 0.6);
        }

        @media (max-width: 600px) {
            .hud-item { font-size: 13px; padding: 4px 12px; }
            #healthBar { width: 120px; height: 8px; }
            #gameOverlay h1 { font-size: 38px; }
            #controls-hint { font-size: 11px; padding: 6px 14px; bottom: 15px; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div id="hud">
        <div class="hud-left">
            <div class="hud-item">💀 SCORE <span id="scoreDisplay">0</span></div>
            <div class="hud-item">🔫 KILLS <span id="killsDisplay">0</span></div>
        </div>
        <div class="hud-right">
            <div class="hud-item">❤️ HEALTH</div>
            <div id="healthBar"><div id="healthFill"></div></div>
            <div class="hud-item" id="wantedLevel">☆☆☆</div>
        </div>
    </div>

    <div id="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> move · <kbd>🖱️</kbd> click to shoot
    </div>

    <!-- Game Overlay -->
    <div id="gameOverlay">
        <h1>☠️ WASTED</h1>
        <div class="sub">You got taken out by the streets</div>
        <div class="final-score">SCORE: <span id="finalScore">0</span></div>
        <button id="restartBtn">↻ GET BACK IN</button>
    </div>

    <script>
        // ============================================================
        //  STREET WARS · Full Screen Arcade Shooter
        //  PWABuilder Ready · Android Compatible
        // ============================================================
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            // ----- resize to full screen -----
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ----- DOM refs -----
            const scoreSpan = document.getElementById('scoreDisplay');
            const killsSpan = document.getElementById('killsDisplay');
            const healthFill = document.getElementById('healthFill');
            const wantedSpan = document.getElementById('wantedLevel');
            const overlay = document.getElementById('gameOverlay');
            const finalScoreSpan = document.getElementById('finalScore');
            const restartBtn = document.getElementById('restartBtn');

            // ----- game state -----
            let W = canvas.width, H = canvas.height;

            const player = {
                x: W/2, y: H/2,
                r: 18,
                speed: 4.2,
                health: 100,
                maxHealth: 100,
                angle: 0,
            };

            let score = 0;
            let kills = 0;
            let gameOver = false;
            let frame = 0;

            let bullets = [];
            let enemies = [];
            let particles = [];
            let explosions = [];

            let shootCooldown = 0;
            const SHOOT_DELAY = 10;

            let enemySpawnTimer = 0;
            const ENEMY_SPAWN_RATE = 45;

            let wantedLevel = 1;

            const keys = { w: false, a: false, s: false, d: false, up: false, down: false, left: false, right: false };

            let mouseX = W/2, mouseY = H/2;
            let mouseDown = false;

            let shakeX = 0, shakeY = 0;
            let shakeIntensity = 0;

            // ----- update HUD -----
            function updateHUD() {
                scoreSpan.textContent = score;
                killsSpan.textContent = kills;
                const pct = Math.max(0, (player.health / player.maxHealth) * 100);
                healthFill.style.width = pct + '%';
                if (player.health < 30) healthFill.style.background = 'linear-gradient(90deg, #ff1744, #ff3d00)';
                else healthFill.style.background = 'linear-gradient(90deg, #ff6d00, #ffab00)';

                const stars = '★'.repeat(wantedLevel) + '☆'.repeat(5 - wantedLevel);
                wantedSpan.textContent = stars;
            }

            // ----- spawn enemy -----
            function spawnEnemy() {
                if (gameOver) return;
                const side = Math.floor(Math.random() * 4);
                let x, y;
                const pad = 40;
                if (side === 0) { x = Math.random() * W; y = -pad; }
                else if (side === 1) { x = W + pad; y = Math.random() * H; }
                else if (side === 2) { x = Math.random() * W; y = H + pad; }
                else { x = -pad; y = Math.random() * H; }

                const speed = 1.2 + Math.random() * 1.6 + (wantedLevel * 0.2);
                enemies.push({
                    x, y,
                    r: 14 + Math.random() * 6,
                    speed: speed,
                    health: 1 + Math.floor(wantedLevel / 2),
                    maxHealth: 1 + Math.floor(wantedLevel / 2),
                    color: `hsl(${Math.random() * 30 + 340}, 70%, 50%)`,
                    shootTimer: 60 + Math.random() * 80,
                });
            }

            // ----- particles -----
            function emitParticles(x, y, color, count = 20, speed = 4) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const spd = 0.5 + Math.random() * speed;
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd,
                        life: 1.0,
                        decay: 0.015 + Math.random() * 0.025,
                        r: 2 + Math.random() * 5,
                        color: color
                    });
                }
            }

            function emitExplosion(x, y, size = 1) {
                for (let i = 0; i < 40 * size; i++) {
                    const angle = Math.random() * 2 * Math.PI;
                    const spd = 1 + Math.random() * 7 * size;
                    const colors = ['#ff6d00', '#ff1744', '#ffab00', '#ff3d00', '#ffffff'];
                    particles.push({
                        x, y,
                        vx: Math.cos(angle) * spd,
                        vy: Math.sin(angle) * spd - 0.5,
                        life: 1.0,
                        decay: 0.008 + Math.random() * 0.02,
                        r: 3 + Math.random() * 8 * size,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }
                shakeIntensity = 6 * size;
            }

            // ----- shoot -----
            function shootBullet() {
                if (gameOver) return;
                if (shootCooldown > 0) return;
                shootCooldown = SHOOT_DELAY;

                const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
                const speed = 10;
                bullets.push({
                    x: player.x + Math.cos(angle) * 28,
                    y: player.y + Math.sin(angle) * 28,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    r: 4,
                    damage: 1,
                    life: 120
                });

                emitParticles(
                    player.x + Math.cos(angle) * 30,
                    player.y + Math.sin(angle) * 30,
                    '#ffd966', 10, 3
                );
                shakeIntensity = 2;
            }

            // ----- reset -----
            function resetGame() {
                player.x = W/2;
                player.y = H/2;
                player.health = player.maxHealth;
                score = 0;
                kills = 0;
                gameOver = false;
                bullets = [];
                enemies = [];
                particles = [];
                wantedLevel = 1;
                shootCooldown = 0;
                enemySpawnTimer = 0;
                shakeIntensity = 0;
                overlay.classList.remove('show');
                updateHUD();
            }

            function triggerGameOver() {
                gameOver = true;
                finalScoreSpan.textContent = score;
                overlay.classList.add('show');
            }

            // ----- update -----
            function update() {
                if (gameOver) return;
                frame++;

                let dx = 0, dy = 0;
                if (keys.w || keys.up) dy -= 1;
                if (keys.s || keys.down) dy += 1;
                if (keys.a || keys.left) dx -= 1;
                if (keys.d || keys.right) dx += 1;
                if (dx !== 0 && dy !== 0) {
                    dx *= 0.707;
                    dy *= 0.707;
                }
                player.x += dx * player.speed;
                player.y += dy * player.speed;
                player.x = Math.max(player.r, Math.min(W - player.r, player.x));
                player.y = Math.max(player.r, Math.min(H - player.r, player.y));

                player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

                if (shootCooldown > 0) shootCooldown--;
                if (mouseDown) shootBullet();

                // bullets
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.x += b.vx;
                    b.y += b.vy;
                    b.life--;
                    if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20 || b.life <= 0) {
                        bullets.splice(i, 1);
                        continue;
                    }
                    let hit = false;
                    for (let j = enemies.length - 1; j >= 0; j--) {
                        const e = enemies[j];
                        const dx2 = b.x - e.x, dy2 = b.y - e.y;
                        if (dx2*dx2 + dy2*dy2 < (b.r + e.r) ** 2) {
                            e.health -= b.damage;
                            emitParticles(b.x, b.y, '#ffd966', 12, 3);
                            if (e.health <= 0) {
                                emitExplosion(e.x, e.y, 1.2);
                                kills++;
                                score += 10 + wantedLevel * 5;
                                enemies.splice(j, 1);
                                wantedLevel = Math.min(5, wantedLevel + 0.15);
                                player.health = Math.min(player.maxHealth, player.health + 4);
                                updateHUD();
                            }
                            hit = true;
                            break;
                        }
                    }
                    if (hit) bullets.splice(i, 1);
                }

                // enemies
                for (let e of enemies) {
                    const dx2 = player.x - e.x, dy2 = player.y - e.y;
                    const dist = Math.sqrt(dx2*dx2 + dy2*dy2);
                    if (dist > 1) {
                        e.x += (dx2 / dist) * e.speed;
                        e.y += (dy2 / dist) * e.speed;
                    }
                    e.shootTimer--;
                    if (e.shootTimer <= 0 && dist < 400) {
                        e.shootTimer = 70 + Math.random() * 100;
                        const angle = Math.atan2(player.y - e.y, player.x - e.x);
                        const spd = 3.5 + wantedLevel * 0.3;
                        for (let k = 0; k < 3; k++) {
                            particles.push({
                                x: e.x,
                                y: e.y,
                                vx: Math.cos(angle + (k-1)*0.15) * spd,
                                vy: Math.sin(angle + (k-1)*0.15) * spd,
                                life: 1.0,
                                decay: 0.025,
                                r: 4,
                                color: '#ff1744',
                                isEnemyBullet: true
                            });
                        }
                    }
                }

                // enemy collision
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    const dx2 = player.x - e.x, dy2 = player.y - e.y;
                    if (dx2*dx2 + dy2*dy2 < (player.r + e.r) ** 2) {
                        player.health -= 15 + wantedLevel * 2;
                        emitExplosion(e.x, e.y, 0.8);
                        enemies.splice(i, 1);
                        if (player.health <= 0) {
                            player.health = 0;
                            updateHUD();
                            triggerGameOver();
                            return;
                        }
                        updateHUD();
                    }
                }

                // enemy bullet collision
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    if (p.isEnemyBullet) {
                        const dx2 = player.x - p.x, dy2 = player.y - p.y;
                        if (dx2*dx2 + dy2*dy2 < (player.r + 6) ** 2) {
                            player.health -= 8 + wantedLevel;
                            emitParticles(p.x, p.y, '#ff1744', 10, 3);
                            particles.splice(i, 1);
                            if (player.health <= 0) {
                                player.health = 0;
                                updateHUD();
                                triggerGameOver();
                                return;
                            }
                            updateHUD();
                            continue;
                        }
                    }
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // spawn enemies
                enemySpawnTimer--;
                if (enemySpawnTimer <= 0) {
                    const count = 1 + Math.floor(wantedLevel / 2);
                    for (let i = 0; i < count; i++) spawnEnemy();
                    enemySpawnTimer = Math.max(20, ENEMY_SPAWN_RATE - wantedLevel * 3);
                }

                // particles update
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx || 0;
                    p.y += p.vy || 0;
                    if (p.vx) p.vx *= 0.98;
                    if (p.vy) p.vy *= 0.98;
                    p.life -= p.decay || 0.02;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                if (shakeIntensity > 0) {
                    shakeIntensity *= 0.92;
                    if (shakeIntensity < 0.1) shakeIntensity = 0;
                    shakeX = (Math.random() - 0.5) * shakeIntensity * 2;
                    shakeY = (Math.random() - 0.5) * shakeIntensity * 2;
                } else {
                    shakeX = 0; shakeY = 0;
                }

                if (enemies.length > 50) enemies.splice(0, enemies.length - 50);
                if (particles.length > 500) particles.splice(0, particles.length - 500);
                if (bullets.length > 100) bullets.splice(0, bullets.length - 100);

                if (frame % 180 === 0 && wantedLevel < 5) {
                    wantedLevel += 0.05;
                }
                updateHUD();
            }

            // ----- draw -----
            function draw() {
                ctx.save();
                ctx.translate(shakeX, shakeY);

                const grad = ctx.createRadialGradient(W/2, H/3, 100, W/2, H/2, W*0.8);
                grad.addColorStop(0, '#1a1a2e');
                grad.addColorStop(1, '#0a0a12');
                ctx.fillStyle = grad;
                ctx.fillRect(-10, -10, W+20, H+20);

                // grid
                ctx.strokeStyle = 'rgba(40, 60, 100, 0.15)';
                ctx.lineWidth = 1;
                for (let i = 0; i < W; i += 80) {
                    ctx.beginPath();
                    ctx.moveTo(i, 0);
                    ctx.lineTo(i, H);
                    ctx.stroke();
                }
                for (let i = 0; i < H; i += 80) {
                    ctx.beginPath();
                    ctx.moveTo(0, i);
                    ctx.lineTo(W, i);
                    ctx.stroke();
                }

                // particles
                for (let p of particles) {
                    ctx.globalAlpha = Math.min(1, p.life * 1.2);
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = p.color || '#ff6d00';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * (0.3 + 0.7 * p.life), 0, Math.PI * 2);
                    ctx.fillStyle = p.color || '#ff6d00';
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // enemies
                for (let e of enemies) {
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#ff1744';
                    ctx.beginPath();
                    ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                    ctx.fillStyle = e.color || '#d32f2f';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(e.x - 5, e.y - 4, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(e.x + 5, e.y - 4, 4, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#ff1744';
                    ctx.beginPath();
                    ctx.arc(e.x - 5, e.y - 4, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(e.x + 5, e.y - 4, 2, 0, Math.PI*2);
                    ctx.fill();
                    if (e.maxHealth > 1) {
                        ctx.fillStyle = 'rgba(0,0,0,0.6)';
                        ctx.fillRect(e.x - 20, e.y - e.r - 12, 40, 5);
                        ctx.fillStyle = '#4caf50';
                        ctx.fillRect(e.x - 20, e.y - e.r - 12, 40 * (e.health/e.maxHealth), 5);
                    }
                }

                // bullets
                for (let b of bullets) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ffd966';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
                    ctx.fillStyle = '#ffd966';
                    ctx.fill();
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r*0.5, 0, Math.PI*2);
                    ctx.fillStyle = '#fff';
                    ctx.fill();
                }

                // player
                ctx.shadowBlur = 40;
                ctx.shadowColor = '#2979ff';
                ctx.beginPath();
                ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
                ctx.fillStyle = '#2979ff';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(player.x - 4, player.y - 4, 8, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fill();
                ctx.strokeStyle = '#bbb';
                ctx.lineWidth = 6;
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(
                    player.x + Math.cos(player.angle) * 30,
                    player.y + Math.sin(player.angle) * 30
                );
                ctx.stroke();
                ctx.strokeStyle = '#888';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(player.x, player.y);
                ctx.lineTo(
                    player.x + Math.cos(player.angle) * 34,
                    player.y + Math.sin(player.angle) * 34
                );
                ctx.stroke();
                ctx.shadowBlur = 0;

                // crosshair
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                const cx = mouseX, cy = mouseY;
                ctx.beginPath();
                ctx.moveTo(cx - 12, cy);
                ctx.lineTo(cx - 6, cy);
                ctx.moveTo(cx + 6, cy);
                ctx.lineTo(cx + 12, cy);
                ctx.moveTo(cx, cy - 12);
                ctx.lineTo(cx, cy - 6);
                ctx.moveTo(cx, cy + 6);
                ctx.lineTo(cx, cy + 12);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                ctx.stroke();

                ctx.restore();
            }

            // ----- game loop -----
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ----- event listeners -----
            document.addEventListener('keydown', (e) => {
                const k = e.key.toLowerCase();
                if (k === 'w') keys.w = true;
                if (k === 'a') keys.a = true;
                if (k === 's') keys.s = true;
                if (k === 'd') keys.d = true;
                if (k === 'arrowup' || e.key === 'ArrowUp') keys.up = true;
                if (k === 'arrowdown' || e.key === 'ArrowDown') keys.down = true;
                if (k === 'arrowleft' || e.key === 'ArrowLeft') keys.left = true;
                if (k === 'arrowright' || e.key === 'ArrowRight') keys.right = true;
                if (k === ' ' || e.key === ' ') { e.preventDefault(); shootBullet(); }
            });
            document.addEventListener('keyup', (e) => {
                const k = e.key.toLowerCase();
                if (k === 'w') keys.w = false;
                if (k === 'a') keys.a = false;
                if (k === 's') keys.s = false;
                if (k === 'd') keys.d = false;
                if (k === 'arrowup' || e.key === 'ArrowUp') keys.up = false;
                if (k === 'arrowdown' || e.key === 'ArrowDown') keys.down = false;
                if (k === 'arrowleft' || e.key === 'ArrowLeft') keys.left = false;
                if (k === 'arrowright' || e.key === 'ArrowRight') keys.right = false;
            });

            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
                mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
            });
            canvas.addEventListener('mousedown', (e) => {
                e.preventDefault();
                mouseDown = true;
                shootBullet();
            });
            canvas.addEventListener('mouseup', () => { mouseDown = false; });
            canvas.addEventListener('mouseleave', () => { mouseDown = false; });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                mouseX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                mouseY = (touch.clientY - rect.top) * (canvas.height / rect.height);
                mouseDown = true;
                shootBullet();
            });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                mouseX = (touch.clientX - rect.left) * (canvas.width / rect.width);
                mouseY = (touch.clientY - rect.top) * (canvas.height / rect.height);
            });
            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                mouseDown = false;
            });

            restartBtn.addEventListener('click', resetGame);

            window.addEventListener('resize', () => {
                resizeCanvas();
                W = canvas.width; H = canvas.height;
                player.x = Math.min(W - player.r, Math.max(player.r, player.x));
                player.y = Math.min(H - player.r, Math.max(player.r, player.y));
            });

            // ----- start -----
            resetGame();
            gameLoop();
        })();
    </script>
</body>
</html>
