<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Video Connection Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        header {
            width: 100%;
            padding: 15px;
            background: #111827;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }
        h1 { font-size: 1.4rem; color: #38bdf8; letter-spacing: 0.5px; }
        #video-container {
            width: 100%;
            flex-grow: 1;
            background: #020617;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Secure Video Connection Hub</h1>
    </header>

    <!-- Secure Video Frame Container -->
    <div id="video-container"></div>

    <script>
        // 1. Generate a consistent room string from the URL
        const urlParams = new URLSearchParams(window.location.search);
        let roomName = urlParams.get('room');
        
        if (!roomName) {
            // Generates a random room name if one doesn't exist
            roomName = 'Hub-' + Math.floor(Math.random() * 900000 + 100000);
            window.history.pushState({}, '', '?room=' + roomName);
        }

        // 2. Build the secure Whereby mobile video iframe
        const container = document.getElementById('video-container');
        const iframe = document.createElement('iframe');
        
        // Using Whereby's open infrastructure optimized for web embedding
        iframe.src = `https://whereby.com{roomName}?embed=true&audio=true&video=true&floatSelf=true`;
        
        // Critical explicit security permissions required by iOS Safari and Android Chrome
        iframe.allow = "camera; microphone; fullscreen; speaker; display-capture";
        
        // Append the working frame to your webpage layout
        container.appendChild(iframe);
    </script>
</body>
</html>
