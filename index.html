<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InvestPro | Smart Investment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================
                   ALL CSS
                   ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00B894;
            --primary-dark: #00856A;
            --secondary: #2D3436;
            --gold: #FDCB6E;
            --success: #00C853;
            --danger: #FF1744;
            --dark: #0A1628;
            --dark-card: #111F3D;
            --light: #F5F7FA;
            --gray: #6B7A8D;
            --white: #FFFFFF;
            --shadow: 0 8px 32px rgba(0, 184, 148, 0.15);
            --radius: 16px;
            --transition: 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
            box-shadow: 0 4px 16px rgba(0, 184, 148, 0.35);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 184, 148, 0.45);
        }

        .btn-whatsapp {
            background: #25D366;
            color: var(--white);
            box-shadow: 0 4px 16px rgba(37, 211, 102, 0.35);
        }
        .btn-whatsapp:hover {
            background: #1da851;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--white);
        }
        .btn-secondary:hover {
            background: #1a1a2e;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover {
            background: var(--primary);
            color: var(--white);
            transform: translateY(-2px);
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }
        .btn-lg {
            padding: 16px 40px;
            font-size: 1.1rem;
        }

        /* ============================================
                   HEADER
                   ============================================ */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--secondary);
        }
        .logo i {
            font-size: 1.8rem;
            color: var(--primary);
        }
        .logo span {
            color: var(--primary);
        }

        .nav ul {
            list-style: none;
            display: flex;
            gap: 32px;
            align-items: center;
        }
        .nav ul li a {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--gray);
            transition: var(--transition);
            position: relative;
        }
        .nav ul li a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 2px;
            background: var(--primary);
            transition: var(--transition);
        }
        .nav ul li a:hover::after,
        .nav ul li a.active::after {
            width: 100%;
        }
        .nav ul li a:hover,
        .nav ul li a.active {
            color: var(--dark);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }
        .hamburger span {
            width: 28px;
            height: 3px;
            background: var(--dark);
            border-radius: 4px;
            transition: var(--transition);
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ============================================
                   HERO
                   ============================================ */
        .hero {
            padding: 120px 0 80px;
            background: linear-gradient(135deg, #E8F8F5 0%, #D5F5E3 100%);
            display: flex;
            align-items: center;
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content .badge {
            display: inline-block;
            background: var(--primary);
            color: var(--white);
            font-weight: 600;
            font-size: 0.75rem;
            padding: 4px 16px;
            border-radius: 50px;
            margin-bottom: 16px;
        }

        .hero-content h1 {
            font-size: 3.8rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 16px;
            color: var(--dark);
        }
        .hero-content
