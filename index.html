<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoChat Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================
                   PROFESSIONAL CSS
                   ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --success: #00C853;
            --danger: #FF1744;
            --dark: #0a0a1a;
            --dark-card: #141428;
            --dark-light: #1a1a2e;
            --light: #f0f2f5;
            --gray: #8892b0;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --transition: 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }

        /* ============================================
                   HEADER
                   ============================================ */
        .header {
            background: rgba(10, 10, 26, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
        }

        .header .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: 800;
        }
        .logo i {
            color: var(--primary);
            font-size: 1.6rem;
        }
        .logo span {
            color: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .room-id-display {
            background: var(--dark-card);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            color: var(--gray);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .room-id-display strong {
            color: var(--white);
        }

        .copy-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 6px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .copy-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .leave-btn {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 6px 18px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .leave-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }

        /* ============================================
                   VIDEO CONTAINER
                   ============================================ */
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 80px 24px 90px;
            height: 100vh;
            align-content: center;
        }

        .video-wrapper {
            background: var(--dark-card);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.05);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .video-wrapper.active {
            border-color: var(--primary);
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a2e;
        }

        .video-label {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.75);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .video-label .status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .video-label .status.online {
            background: var(--success);
        }
        .video-label .status.offline {
            background: var(--danger);
        }

        .no-video {
            color: var(--gray);
            font-size: 1.1rem;
            text-align: center;
            padding: 20px;
        }
        .no-video i {
            font-size: 4rem;
            display: block;
            margin-bottom: 12px;
            color: var(--gray);
            opacity: 0.3;
        }

        /* ============================================
                   CONTROLS
                   ============================================ */
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-card);
            padding: 14px 24px;
            border-radius: 60px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
            flex-wrap: wrap;
            justify-content: center;
            backdrop-filter: blur(12px);
        }

        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            color: var(--white);
        }
        .control-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.12);
        }
        .control-btn.active {
            background: var(--primary);
            color: var(--white);
        }
        .control-btn.active:hover {
            background: var(--primary-dark);
        }
        .control-btn.danger {
            background: var(--danger);
            color: var(--white);
        }
        .control-btn.danger:hover {
            background: #cc0000;
        }
        .control-btn.muted {
            background: var(--danger);
            color: var(--white);
        }

        /* ============================================
                   JOIN SCREEN
                   ============================================ */
        .join-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .join-screen.hidden {
            display: none;
        }

        .join-box {
            background: var(--dark-card);
            padding: 48px 40px;
            border-radius: var(--radius);
            max-width: 450px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        .join-box .icon {
            font-size: 4rem;
            color: var(--primary);
            margin-bottom: 16px;
        }
        .join-box h2 {
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .join-box p {
            color: var(--gray);
            margin-bottom: 24px;
        }
        .join-box input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            margin-bottom: 12px;
        }
        .join-box input:focus {
            border-color: var(--primary);
        }
        .join-box input::placeholder {
            color: var(--gray);
        }
        .join-box .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: var(--primary);
            color: var(--white);
        }
        .join-box .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .join-box .or {
            color: var(--gray);
            margin: 16px 0;
            font-size: 0.9rem;
        }
        .join-box .btn-secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
        }
        .join-box .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* ============================================
                   PARTICIPANTS
                   ============================================ */
        .participants {
            position: fixed;
            top: 80px;
            right: 24px;
            background: var(--dark-card);
            padding: 16px 20px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 150px;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .participants h4 {
            font-size: 0.75rem;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .participants ul {
            list-style: none;
            font-size: 0.9rem;
        }
        .participants ul li {
            padding: 4px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .participants ul li .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
        }
        .participants ul li .dot.offline {
            background: var(--danger);
        }

        /* ============================================
                   RESPONSIVE
                   ============================================ */
        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
                padding: 70px 16px 100px;
                gap: 12px;
            }
            .video-wrapper {
                min-height: 200px;
            }
            .controls {
                padding: 12px 16px;
                gap: 8px;
                bottom: 16px;
                width: 95%;
                border-radius: 40px;
            }
            .control-btn {
                width: 42px;
                height: 42px;
                font-size: 0.95rem;
            }
            .participants {
                display: none;
            }
            .header .container {
                flex-wrap: wrap;
                gap: 8px;
            }
            .room-id-display {
                font-size: 0.7rem;
                padding: 4px 12px;
            }
            .join-box {
                padding: 32px 24px;
            }
            .join-box h2 {
                font-size: 1.4rem;
            }
            .header-right .leave-btn {
                padding: 4px 12px;
                font-size: 0.7rem;
            }
            .header-right .copy-btn {
                padding: 4px 12px;
                font-size: 0.7rem;
            }
        }

        @media (max-width: 480px) {
            .video-wrapper {
                min-height: 160px;
            }
            .control-btn {
                width: 36px;
                height: 36px;
                font-size: 0.8rem;
            }
            .controls {
                gap: 6px;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    JOIN SCREEN
    ============================================ -->
    <div class="join-screen" id="joinScreen">
        <div class="join-box">
            <div class="icon"><i class="fas fa-video"></i></div>
            <h2>Video Chat Room</h2>
            <p>Join a room or create your own</p>

            <input type="text" id="roomInput" placeholder="Enter Room ID..." />
            <button class="btn" onclick="joinRoom()"><i class="fas fa-sign-in-alt"></i> Join Room</button>

            <div class="or">or</div>

            <button class="btn btn-secondary" onclick="createRoom()">
                <i class="fas fa-plus-circle"></i> Create New Room
            </button>

            <p style="color:var(--gray);font-size:0.8rem;margin-top:16px;">
                <i class="fas fa-shield-alt"></i> End-to-end encrypted
            </p>
        </div>
    </div>

    <!-- ============================================
    HEADER
    ============================================ -->
    <header class="header" id="mainHeader" style="display:none;">
        <div class="container">
            <div class="logo">
                <i class="fas fa-video"></i>
                <span>Chat<span>Room</span></span>
            </div>
            <div class="header-right">
                <div class="room-id-display">
                    <i class="fas fa-hashtag"></i> <strong id="roomIdDisplay">---</strong>
                </div>
                <button class="copy-btn" onclick="copyRoomId()">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button class="leave-btn" onclick="leaveRoom()">
                    <i class="fas fa-sign-out-alt"></i> Leave
                </button>
            </div>
        </div>
    </header>

    <!-- ============================================
    PARTICIPANTS
    ============================================ -->
    <div class="participants" id="participants">
        <h4><i class="fas fa-users"></i> Participants</h4>
        <ul id="participantsList">
            <li><span class="dot"></span> You</li>
        </ul>
    </div>

    <!-- ============================================
    VIDEO CONTAINER
    ============================================ -->
    <div class="video-container" id="videoContainer">
        <div class="video-wrapper active" id="localVideoWrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-label">
                <span class="status online"></span> You
            </div>
        </div>
        <div class="video-wrapper" id="remoteVideoWrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="no-video" id="remotePlaceholder">
                <i class="fas fa-user-friends"></i>
                <p>Waiting for someone to join...</p>
            </div>
            <div class="video-label" id="remoteLabel" style="display:none;">
                <span class="status online"></span> <span id="remoteName">Guest</span>
            </div>
        </div>
    </div>

    <!-- ============================================
    CONTROLS
    ============================================ -->
    <div class="controls" id="controls">
        <button class="control-btn active" id="micBtn" onclick="toggleMic()" title="Mute/Unmute">
            <i class="fas fa-microphone"></i>
        </button>
        <button class="control-btn active" id="cameraBtn" onclick="toggleCamera()" title="Camera On/Off">
            <i class="fas fa-video"></i>
        </button>
        <button class="control-btn" id="screenBtn" onclick="toggleScreen()" title="Share Screen">
            <i class="fas fa-desktop"></i>
        </button>
        <button class="control-btn danger" onclick="leaveRoom()" title="End Call">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>

    <!-- ============================================
    JAVASCRIPT
    ============================================ -->
    <script>
        // ============================================
        // PEERJS
        // ============================================
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });

        let currentRoom = null;
        let localStream = null;
        let remoteStream = null;
        let call = null;
        let isMuted = false;
        let isCameraOff = false;
        let screenStream = null;
        let isScreenSharing = false;

        // ============================================
        // DOM
        // ============================================
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const remotePlaceholder = document.getElementById('remotePlaceholder');
        const remoteLabel = document.getElementById('remoteLabel');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const participantsList = document.getElementById('participantsList');
        const joinScreen = document.getElementById('joinScreen');
        const mainHeader = document.getElementById('mainHeader');
        const roomInput = document.getElementById('roomInput');

        // ============================================
        // PEER EVENTS
        // ============================================
        peer.on('open', (id) => {
            console.log('✅ Connected with ID:', id);
            roomInput.placeholder = 'Your ID: ' + id;
        });

        peer.on('error', (err) => {
            console.error('Peer error:', err);
            if (err.type === 'unavailable-id') {
                alert('This room ID is already taken. Please try another.');
            }
        });

        // ============================================
        // CREATE / JOIN ROOM
        // ============================================
        function createRoom() {
            const roomId = generateRoomId();
            document.getElementById('roomInput').value = roomId;
            joinRoom(roomId);
        }

        function joinRoom(roomId) {
            roomId = roomId || document.getElementById('roomInput').value.trim();
            if (!roomId) {
                alert('Please enter a Room ID');
                return;
            }

            currentRoom = roomId;
            roomIdDisplay.textContent = roomId;

            mainHeader.style.display = 'block';
            joinScreen.classList.add('hidden');

            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then((stream) => {
                    localStream = stream;
                    localVideo.srcObject = stream;

                    const conn = peer.connect(roomId);
                    conn.on('open', () => {
                        console.log('✅ Connected to room:', roomId);
                        callPeer(roomId);
                    });

                    setTimeout(() => {
                        if (!call) {
                            console.log('📞 Waiting for others to join...');
                        }
                    }, 1000);

                    peer.on('call', (incomingCall) => {
                        console.log('📞 Incoming call from:', incomingCall.peer);
                        if (localStream) {
                            incomingCall.answer(localStream);
                            handleCall(incomingCall);
                        }
                    });

                    updateParticipants('You', true);
                })
                .catch((err) => {
                    console.error('Error accessing media:', err);
                    alert('Please allow camera and microphone access.');
                });
        }

        function callPeer(roomId) {
            const callPeer = peer.call(roomId, localStream);
            if (callPeer) {
                handleCall(callPeer);
            }
        }

        function handleCall(incomingCall) {
            call = incomingCall;
            call.on('stream', (remoteStreamData) => {
                remoteStream = remoteStreamData;
                remoteVideo.srcObject = remoteStreamData;
                remotePlaceholder.style.display = 'none';
                remoteLabel.style.display = 'flex';
                document.getElementById('remoteName').textContent = 'Guest';
                updateParticipants('Guest', true);
                console.log('✅ Remote stream connected');
            });

            call.on('close', () => {
                console.log('🔴 Call ended');
                remoteVideo.srcObject = null;
                remotePlaceholder.style.display = 'block';
                remoteLabel.style.display = 'none';
                updateParticipants('Guest', false);
                call = null;
            });
        }

        // ============================================
        // CONTROLS
        // ============================================
        function toggleMic() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            const btn = document.getElementById('micBtn');
            btn.classList.toggle('muted');
            btn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }

        function toggleCamera() {
            if (!localStream) return;
            isCameraOff = !isCameraOff;
            localStream.getVideoTracks().forEach(track => track.enabled = !isCameraOff);
            const btn = document.getElementById('cameraBtn');
            btn.classList.toggle('muted');
            btn.innerHTML = isCameraOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        }

        function toggleScreen() {
            if (isScreenSharing) {
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                    screenStream = null;
                }
                localVideo.srcObject = localStream;
                isScreenSharing = false;
                document.getElementById('screenBtn').classList.remove('muted');
                document.getElementById('screenBtn').innerHTML = '<i class="fas fa-desktop"></i>';
                return;
            }

            navigator.mediaDevices.getDisplayMedia({ video: true })
                .then((stream) => {
                    screenStream = stream;
                    localVideo.srcObject = stream;
                    isScreenSharing = true;
                    document.getElementById('screenBtn').classList.add('muted');
                    document.getElementById('screenBtn').innerHTML = '<i class="fas fa-stop"></i>';

                    stream.getVideoTracks()[0].onended = () => {
                        toggleScreen();
                    };
                })
                .catch((err) => {
                    console.error('Screen sharing error:', err);
                    alert('Screen sharing cancelled or not supported.');
                });
        }

        // ============================================
        // LEAVE ROOM
        // ============================================
        function leaveRoom() {
            if (confirm('Are you sure you want to leave the room?')) {
                if (call) {
                    call.close();
                    call = null;
                }

                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => track.stop());
                    remoteStream = null;
                }
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                    screenStream = null;
                }

                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                remotePlaceholder.style.display = 'block';
                remoteLabel.style.display = 'none';
                document.getElementById('micBtn').classList.remove('muted');
                document.getElementById('micBtn').innerHTML = '<i class="fas fa-microphone"></i>';
                document.getElementById('cameraBtn').classList.remove('muted');
                document.getElementById('cameraBtn').innerHTML = '<i class="fas fa-video"></i>';
                document.getElementById('screenBtn').classList.remove('muted');
                document.getElementById('screenBtn').innerHTML = '<i class="fas fa-desktop"></i>';
                isMuted = false;
                isCameraOff = false;
                isScreenSharing = false;

                mainHeader.style.display = 'none';
                joinScreen.classList.remove('hidden');
                currentRoom = null;

                peer.disconnect();
                setTimeout(() => {
                    peer.reconnect();
                }, 1000);

                updateParticipants('You', false);
            }
        }

        // ============================================
        // UTILITY
        // ============================================
        function generateRoomId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = '';
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        function copyRoomId() {
            const roomId = roomIdDisplay.textContent;
            navigator.clipboard.writeText(roomId).then(() => {
                alert('Room ID copied: ' + roomId);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = roomId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('Room ID copied: ' + roomId);
            });
        }

        function updateParticipants(name, online) {
            const list = participantsList;
            if (online) {
                if (!list.querySelector(`[data-name="${name}"]`)) {
                    const li = document.createElement('li');
                    li.setAttribute('data-name', name);
                    li.innerHTML = `<span class="dot"></span> ${name}`;
                    list.appendChild(li);
                }
            } else {
                const item = list.querySelector(`[data-name="${name}"]`);
                if (item) item.remove();
            }
        }

        // ============================================
        // ENTER KEY
        // ============================================
        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });

        console.log('🎥 Video Chat Room Loaded!');
        console.log('📱 Share your Room ID with others to start chatting!');
    </script>
</body>
</html>
