<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Video Call Room</title>
    <style>
        /* Modern Dark Theme Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        header {
            width: 100%;
            padding: 15px;
            background: #111827;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }
        h1 { font-size: 1.4rem; color: #38bdf8; letter-spacing: 0.5px; }
        #meet-frame {
            width: 100%;
            flex-grow: 1;
            background: #000000;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <header>
        <h1>Secure Video Connection Hub</h1>
    </header>

    <!-- The Actual Full-Screen Video Calling Container -->
    <div id="meet-frame"></div>

    <!-- Load the Global Open-Source WebRTC Script Engine -->
    <script src="https://jit.si"></script>
    <script>
        // 1. Check the browser address bar for a room tag
        const urlParams = new URLSearchParams(window.location.search);
        let roomName = urlParams.get('room');
        
        // 2. If no room tag exists, create a random room number automatically
        if (!roomName) {
            roomName = 'Call_' + Math.floor(Math.random() * 900000 + 100000);
            window.history.pushState({}, '', '?room=' + roomName);
        }

        // 3. Launch the video call layout inside the page
        const domain = 'meet.jit.si';
        const options = {
            roomName: roomName,
            parentNode: document.querySelector('#meet-frame'),
            width: '100%',
            height: '100%',
            lang: 'en',
            configOverwrite: {
                startWithAudioMuted: false,
                startWithVideoMuted: false,
                disableDeepLinking: true // Prevents forcing users to download mobile apps
            },
            interfaceConfigOverwrite: {
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen',
                    'fittowindow', 'hangup', 'chat', 'raisehand',
                    'videoquality', 'tileview', 'shortcuts'
                ]
            }
        };
        
        // Initialize the call session
        const api = new JitsiMeetExternalAPI(domain, options);
    </script>
</body>
</html>
