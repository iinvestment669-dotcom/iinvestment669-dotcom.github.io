<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Video Connection Hub</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        header {
            width: 100%;
            padding: 15px;
            background: #111827;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }
        h1 { font-size: 1.4rem; color: #38bdf8; letter-spacing: 0.5px; }
        #call-container {
            width: 100%;
            flex-grow: 1;
            background: #020617;
            position: relative;
        }
        /* Style the embedded frame to take full screen height safely */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Secure Video Connection Hub</h1>
    </header>

    <!-- Container where the video calling dashboard will appear -->
    <div id="call-container"></div>

    <!-- Loading Daily.co Video Core Script Engine -->
    <script src="https://unpkg.com"></script>
    <script>
        // 1. Generate or grab a room string from the website address line
        const urlParams = new URLSearchParams(window.location.search);
        let roomName = urlParams.get('room');
        
        if (!roomName) {
            roomName = 'Room_' + Math.floor(Math.random() * 90000 + 10000);
            window.history.pushState({}, '', '?room=' + roomName);
        }

        // 2. Initialize the Daily calling frame inside our layout box
        const callWrapper = document.getElementById('call-container');
        
        // We use a public, direct multi-user calling line
        const callFrame = window.DailyIframe.createFrame(callWrapper, {
            iframeStyle: {
                width: '100%',
                height: '100%',
                border: 'none'
            }
        });

        // 3. Connect to the public calling server with your room string
        callFrame.join({ 
            url: `https://daily.co{roomName}`,
            showLeaveButton: true
        });
    </script>
</body>
</html>
