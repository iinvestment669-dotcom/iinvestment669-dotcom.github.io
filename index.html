<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Chat Room</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --dark: #0a0a1a;
            --dark-card: #141428;
            --light: #f0f2f5;
            --gray: #8892b0;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--dark);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
        }

        /* ===== HEADER ===== */
        .header {
            background: rgba(10, 10, 26, 0.95);
            padding: 12px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 800;
        }
        .logo i {
            color: var(--primary);
            font-size: 1.4rem;
        }
        .logo span {
            color: var(--primary);
        }

        .room-id-display {
            background: var(--dark-card);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--gray);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .room-id-display strong {
            color: var(--white);
        }

        .copy-btn {
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .copy-btn:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        .leave-btn {
            background: #ff4444;
            color: var(--white);
            border: none;
            padding: 6px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }
        .leave-btn:hover {
            background: #cc0000;
            transform: scale(1.05);
        }

        /* ===== VIDEO CONTAINER ===== */
        .video-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            padding: 80px 20px 100px;
            height: 100vh;
            align-content: center;
        }

        .video-wrapper {
            background: var(--dark-card);
            border-radius: var(--radius);
            overflow: hidden;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.05);
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-wrapper.active {
            border-color: var(--primary);
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #111;
        }

        .video-label {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .video-label .status {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .video-label .status.online {
            background: #00C853;
        }
        .video-label .status.offline {
            background: #ff4444;
        }

        .no-video {
            color: var(--gray);
            font-size: 0.9rem;
            text-align: center;
            padding: 20px;
        }
        .no-video i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
            color: var(--gray);
        }

        /* ===== CONTROLS ===== */
        .controls {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-card);
            padding: 12px 20px;
            border-radius: 60px;
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .control-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.06);
            color: var(--white);
        }
        .control-btn:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.12);
        }
        .control-btn.active {
            background: var(--primary);
            color: var(--white);
        }
        .control-btn.active:hover {
            background: var(--primary-dark);
        }
        .control-btn.danger {
            background: #ff4444;
            color: var(--white);
        }
        .control-btn.danger:hover {
            background: #cc0000;
        }
        .control-btn.muted {
            background: #ff4444;
            color: var(--white);
        }

        /* ===== JOIN SCREEN ===== */
        .join-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .join-screen.hidden {
            display: none;
        }

        .join-box {
            background: var(--dark-card);
            padding: 40px 36px;
            border-radius: var(--radius);
            max-width: 420px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .join-box .icon {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .join-box h2 {
            font-size: 1.6rem;
            margin-bottom: 4px;
        }
        .join-box p {
            color: var(--gray);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .join-box input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            margin-bottom: 10px;
        }
        .join-box input:focus {
            border-color: var(--primary);
        }
        .join-box input::placeholder {
            color: var(--gray);
        }
        .join-box .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            background: var(--primary);
            color: var(--white);
        }
        .join-box .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .join-box .or {
            color: var(--gray);
            margin: 14px 0;
            font-size: 0.85rem;
        }
        .join-box .btn-secondary {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: var(--white);
        }
        .join-box .btn-secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .join-box .my-id {
            color: var(--gray);
            font-size: 0.8rem;
            margin-top: 12px;
        }
        .join-box .my-id strong {
            color: var(--white);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .video-container {
                grid-template-columns: 1fr;
                padding: 70px 12px 100px;
                gap: 10px;
            }
            .video-wrapper {
                min-height: 180px;
            }
            .controls {
                padding: 10px 14px;
                gap: 8px;
                bottom: 16px;
                width: 95%;
                border-radius: 40px;
            }
            .control-btn {
                width: 40px;
                height: 40px;
                font-size: 0.85rem;
            }
            .header .container {
                flex-wrap: wrap;
                gap: 6px;
            }
            .room-id-display {
                font-size: 0.7rem;
                padding: 4px 10px;
            }
            .join-box {
                padding: 28px 20px;
            }
            .join-box h2 {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .video-wrapper {
                min-height: 140px;
            }
            .control-btn {
                width: 36px;
                height: 36px;
                font-size: 0.75rem;
            }
            .controls {
                gap: 4px;
                padding: 8px 10px;
            }
            .leave-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            .copy-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== JOIN SCREEN ===== -->
    <div class="join-screen" id="joinScreen">
        <div class="join-box">
            <div class="icon"><i class="fas fa-video"></i></div>
            <h2>Video Chat Room</h2>
            <p>Join a room or create your own</p>

            <input type="text" id="roomInput" placeholder="Enter Room ID..." />
            <button class="btn" onclick="joinRoom()"><i class="fas fa-sign-in-alt"></i> Join Room</button>

            <div class="or">or</div>

            <button class="btn btn-secondary" onclick="createRoom()">
                <i class="fas fa-plus-circle"></i> Create New Room
            </button>

            <p class="my-id">Your ID: <strong id="myPeerId">Loading...</strong></p>
        </div>
    </div>

    <!-- ===== HEADER ===== -->
    <header class="header" id="mainHeader" style="display:none;">
        <div class="container">
            <div class="logo">
                <i class="fas fa-video"></i>
                <span>Chat<span>Room</span></span>
            </div>
            <div class="room-id-display">
                Room: <strong id="roomIdDisplay">---</strong>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <button class="copy-btn" onclick="copyRoomId()"><i class="fas fa-copy"></i> Copy</button>
                <button class="leave-btn" onclick="leaveRoom()"><i class="fas fa-sign-out-alt"></i> Leave</button>
            </div>
        </div>
    </header>

    <!-- ===== VIDEO ===== -->
    <div class="video-container" id="videoContainer">
        <div class="video-wrapper active" id="localVideoWrapper">
            <video id="localVideo" autoplay muted playsinline></video>
            <div class="video-label">
                <span class="status online"></span> You
            </div>
        </div>
        <div class="video-wrapper" id="remoteVideoWrapper">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="no-video" id="remotePlaceholder">
                <i class="fas fa-user"></i>
                <p>Waiting for someone to join...</p>
            </div>
            <div class="video-label" id="remoteLabel" style="display:none;">
                <span class="status online"></span> Guest
            </div>
        </div>
    </div>

    <!-- ===== CONTROLS ===== -->
    <div class="controls" id="controls">
        <button class="control-btn active" id="micBtn" onclick="toggleMic()">
            <i class="fas fa-microphone"></i>
        </button>
        <button class="control-btn active" id="cameraBtn" onclick="toggleCamera()">
            <i class="fas fa-video"></i>
        </button>
        <button class="control-btn" id="screenBtn" onclick="toggleScreen()">
            <i class="fas fa-desktop"></i>
        </button>
        <button class="control-btn danger" onclick="leaveRoom()">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>

    <!-- ============================================
    JAVASCRIPT - FULLY WORKING
    ============================================ -->
    <script>
        // ============================================
        // PEERJS - WITH CLOUD SERVER
        // ============================================
        const peer = new Peer({
            config: {
                'iceServers': [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                    { urls: 'stun:stun3.l.google.com:19302' },
                ]
            }
        });

        let currentRoom = null;
        let localStream = null;
        let remoteStream = null;
        let call = null;
        let isMuted = false;
        let isCameraOff = false;
        let screenStream = null;
        let isScreenSharing = false;
        let myPeerId = null;

        // ===== DOM =====
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const remotePlaceholder = document.getElementById('remotePlaceholder');
        const remoteLabel = document.getElementById('remoteLabel');
        const roomIdDisplay = document.getElementById('roomIdDisplay');
        const joinScreen = document.getElementById('joinScreen');
        const mainHeader = document.getElementById('mainHeader');
        const roomInput = document.getElementById('roomInput');
        const myPeerIdEl = document.getElementById('myPeerId');

        // ============================================
        // PEER EVENTS
        // ============================================
        peer.on('open', (id) => {
            myPeerId = id;
            myPeerIdEl.textContent = id;
            console.log('✅ Connected with ID:', id);
        });

        peer.on('error', (err) => {
            console.error('Peer error:', err);
            if (err.type === 'unavailable-id') {
                alert('❌ This room ID is already taken. Please try another.');
            }
        });

        // ============================================
        // CREATE / JOIN ROOM
        // ============================================
        function createRoom() {
            const roomId = generateRoomId();
            document.getElementById('roomInput').value = roomId;
            joinRoom(roomId);
        }

        function joinRoom(roomId) {
            roomId = roomId || document.getElementById('roomInput').value.trim();
            if (!roomId) {
                alert('Please enter a Room ID');
                return;
            }

            currentRoom = roomId;
            roomIdDisplay.textContent = roomId;

            mainHeader.style.display = 'block';
            joinScreen.classList.add('hidden');

            // Get media
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then((stream) => {
                    localStream = stream;
                    localVideo.srcObject = stream;

                    // Listen for incoming calls FIRST
                    peer.on('call', (incomingCall) => {
                        console.log('📞 Incoming call from:', incomingCall.peer);
                        if (localStream) {
                            incomingCall.answer(localStream);
                            handleCall(incomingCall);
                        }
                    });

                    // Then try to call the room
                    setTimeout(() => {
                        const callPeerObj = peer.call(roomId, localStream);
                        if (callPeerObj) {
                            handleCall(callPeerObj);
                        } else {
                            console.log('📞 Waiting for someone to join...');
                            // Show waiting message
                            remotePlaceholder.innerHTML = `
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Waiting for someone to join...</p>
                                <p style="font-size:0.8rem;color:#666;">Share Room ID: <strong>${roomId}</strong></p>
                            `;
                        }
                    }, 1000);

                })
                .catch((err) => {
                    console.error('Error accessing media:', err);
                    alert('❌ Please allow camera and microphone access.');
                    // Fallback: audio only
                    navigator.mediaDevices.getUserMedia({ video: false, audio: true })
                        .then((stream) => {
                            localStream = stream;
                            localVideo.srcObject = stream;
                            alert('⚠️ Camera not available. Audio only mode.');
                        })
                        .catch(() => {
                            alert('❌ Cannot access camera or microphone.');
                        });
                });
        }

        function handleCall(incomingCall) {
            call = incomingCall;
            call.on('stream', (remoteStreamData) => {
                remoteStream = remoteStreamData;
                remoteVideo.srcObject = remoteStreamData;
                remotePlaceholder.style.display = 'none';
                remoteLabel.style.display = 'flex';
                console.log('✅ Remote stream connected!');
            });

            call.on('close', () => {
                console.log('🔴 Call ended');
                remoteVideo.srcObject = null;
                remotePlaceholder.style.display = 'block';
                remoteLabel.style.display = 'none';
                remotePlaceholder.innerHTML = `
                    <i class="fas fa-user"></i>
                    <p>Other user has left...</p>
                `;
                call = null;
            });
        }

        // ============================================
        // CONTROLS
        // ============================================
        function toggleMic() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(track => track.enabled = !isMuted);
            const btn = document.getElementById('micBtn');
            btn.classList.toggle('muted');
            btn.innerHTML = isMuted ? '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        }

        function toggleCamera() {
            if (!localStream) return;
            isCameraOff = !isCameraOff;
            localStream.getVideoTracks().forEach(track => track.enabled = !isCameraOff);
            const btn = document.getElementById('cameraBtn');
            btn.classList.toggle('muted');
            btn.innerHTML = isCameraOff ? '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        }

        function toggleScreen() {
            if (isScreenSharing) {
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                    screenStream = null;
                }
                localVideo.srcObject = localStream;
                isScreenSharing = false;
                document.getElementById('screenBtn').classList.remove('muted');
                document.getElementById('screenBtn').innerHTML = '<i class="fas fa-desktop"></i>';
                return;
            }

            navigator.mediaDevices.getDisplayMedia({ video: true })
                .then((stream) => {
                    screenStream = stream;
                    localVideo.srcObject = stream;
                    isScreenSharing = true;
                    document.getElementById('screenBtn').classList.add('muted');
                    document.getElementById('screenBtn').innerHTML = '<i class="fas fa-stop"></i>';

                    stream.getVideoTracks()[0].onended = () => {
                        toggleScreen();
                    };
                })
                .catch(() => {
                    alert('Screen sharing cancelled.');
                });
        }

        // ============================================
        // LEAVE ROOM
        // ============================================
        function leaveRoom() {
            if (confirm('Are you sure you want to leave?')) {
                if (call) {
                    call.close();
                    call = null;
                }

                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => track.stop());
                    remoteStream = null;
                }
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                    screenStream = null;
                }

                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                remotePlaceholder.style.display = 'block';
                remoteLabel.style.display = 'none';
                remotePlaceholder.innerHTML = `
                    <i class="fas fa-user"></i>
                    <p>Waiting for someone to join...</p>
                `;

                document.getElementById('micBtn').classList.remove('muted');
                document.getElementById('micBtn').innerHTML = '<i class="fas fa-microphone"></i>';
                document.getElementById('cameraBtn').classList.remove('muted');
                document.getElementById('cameraBtn').innerHTML = '<i class="fas fa-video"></i>';
                document.getElementById('screenBtn').classList.remove('muted');
                document.getElementById('screenBtn').innerHTML = '<i class="fas fa-desktop"></i>';
                isMuted = false;
                isCameraOff = false;
                isScreenSharing = false;

                mainHeader.style.display = 'none';
                joinScreen.classList.remove('hidden');
                currentRoom = null;
            }
        }

        // ============================================
        // UTILITY
        // ============================================
        function generateRoomId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let id = '';
            for (let i = 0; i < 6; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        function copyRoomId() {
            const roomId = roomIdDisplay.textContent;
            navigator.clipboard.writeText(roomId).then(() => {
                alert('✅ Room ID copied: ' + roomId);
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = roomId;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Room ID copied: ' + roomId);
            });
        }

        // ============================================
        // ENTER KEY
        // ============================================
        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });

        console.log('🎥 Video Chat Room Loaded!');
        console.log('📱 Share Room ID with others to connect!');
        console.log('🔑 Your ID will appear on the join screen.');
    </script>
</body>
</html>
